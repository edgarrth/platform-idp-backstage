apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: frontend-local-sli
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    backstage.io/kubernetes-id: frontend
  labels:
    backstage.io/kubernetes-id: frontend
spec:
  args:
    - name: service-name
      value: frontend
    - name: prometheus-address
      value: http://prometheus-server.prometheus.svc.cluster.local
  metrics: # golden metrics (4) -> saturacion, RED (Request, Error, Duration)
    - name: success-rate
      interval: 60s
      count: 3
      successCondition: result[0] >= 0.98
      failureLimit: 1
      consecutiveErrorLimit: 0
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: |
            (
              sum(rate(istio_requests_total{
                destination_service_name=~"{{args.service-name}}.*",
                response_code!~"5.*"
              }[4m]))
              /
              sum(rate(istio_requests_total{
                destination_service_name=~"{{args.service-name}}.*"
              }[4m]))
            )
    - name: latency-p98-ms
      interval: 30s
      count: 3
      successCondition: result[0] < 1000
      failureLimit: 1
      consecutiveErrorLimit: 0
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: "histogram_quantile(\n  0.98,\n  sum(rate(istio_request_duration_milliseconds_bucket{\n    destination_service_name=~\"{{args.service-name}}.*\"\n  }[4m])) by (le)\n) \n"
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    backstage.io/kubernetes-id: frontend
  annotations:
    argocd.argoproj.io/sync-wave: '2'
    backstage.io/kubernetes-id: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        backstage.io/kubernetes-id: frontend
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: 'true'
        instrumentation.opentelemetry.io/inject-sdk: 'true'
        instrumentation.opentelemetry.io/inject-into-containers: server
        backstage.io/kubernetes-id: frontend
    spec:
      serviceAccountName: frontend
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      nodeSelector:
        node: workloads
      containers:
        - name: server
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
          image: docker.io/wjma90/frontend:main-8f68490eb335 # 8ac078a3c453 #8f68490eb335
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: Cookie
                  value: shop_session-id=x-readiness-probe
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: Cookie
                  value: shop_session-id=x-liveness-probe
          env:
            - name: PORT
              value: "8080"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice:8080"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice:5050"
            - name: AD_SERVICE_ADDR
              value: "adservice:9555"
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: "shoppingassistantservice:80"
            # # ENV_PLATFORM: One of: local, gcp, aws, azure, onprem, alibaba
            # # When not set, defaults to "local" unless running in GKE, otherwies auto-sets to gcp
            # - name: ENV_PLATFORM
            #   value: "aws"
            - name: ENABLE_PROFILER
              value: "0"
            # - name: CYMBAL_BRANDING
            #   value: "true"
            - name: ENABLE_ASSISTANT
              value: "false"
            # - name: FRONTEND_MESSAGE
            #   value: "Replace this with a message you want to display on all pages."
            # As part of an optional Google Cloud demo, you can run an optional microservice called the "packaging service".
            # - name: PACKAGING_SERVICE_URL
            #   value: "" # This value would look like "http://123.123.123"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: ENABLE_METRICS
              value: "1"
            - name: ENABLE_LOGS
              value: "1"
            - name: ENABLE_FARO
              value: "1"
            - name: FARO_COLLECTOR_URL
              value: "https://faro-collector-prod-us-east-2.grafana.net/collect/b4978023a13000b7d85c0944df6e2561"
            - name: FARO_APP_NAME
              value: "local-webapp"
            - name: FARO_APP_VERSION
              value: "1.0.0"
            - name: FARO_APP_ENVIRONMENT
              value: "production"
            - name: FARO_TRACING_ENABLED
              value: "true"
            - name: FARO_TRACE_PROPAGATION_TARGETS
              value: "/api/checkout"
            - name: CLUSTER_NAME
              value: "local"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
  strategy:
    canary:
      stableService: frontend-stable
      canaryService: frontend-canary
      trafficRouting:
        # Gateway API activo: Argo Rollouts modifica los weights del HTTPRoute.
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: frontend-route
            namespace: default
            # Comparacion con Istio VirtualService:
            # istio:
            #   virtualService:
            #     name: frontend-rollout
            #     routes:
            #     - primary
      steps:
        - setWeight: 10
        - pause:
            duration: 3m
        - analysis:
            templates:
              - templateName: frontend-local-sli # despliegue correcto -> queries que evaluen reinicios, deploy de replicas ,etc
                args:
                  - name: service-name
                    value: frontend
        - setWeight: 30
        - pause:
            duration: 3m
        - analysis:
            templates:
              - templateName: frontend-local-sli # SLI
                args:
                  - name: service-name
                    value: frontend
        - setWeight: 60
        - pause:
            duration: 4m
        - analysis:
            templates:
              - templateName: frontend-local-sli # SLI + SLO + SLI de otros servicios que dependen de este componente
                args:
                  - name: service-name
                    value: frontend
                    # - pause:
                    #     duration: 4m
---
