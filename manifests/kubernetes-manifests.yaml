apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: '1'
    backstage.io/kubernetes-id: frontend
  labels:
    backstage.io/kubernetes-id: frontend
