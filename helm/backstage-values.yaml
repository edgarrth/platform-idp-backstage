fullnameOverride: backstage

backstage:
  replicas: 1

  image:
    registry: docker.io
    repository: edgarrth/demo-idp
    tag: "0.0.2"
    pullPolicy: IfNotPresent

  command:
    - node
    - packages/backend
  args:
    - --config
    - app-config.yaml

  containerPorts:
    backend: 7007

  appConfig:
    app:
      title: Demo IDP
      baseUrl: ${BACKSTAGE_BASE_URL}
      packages: all
      extensions:
        # Configure the catalog index page to be the root page, this is normally mounted on /catalog
        - page:catalog:
            config:
              path: /
        - page:kubernetes:
            disabled: true
        - catalog-filter:catalog/list:
            config:
              initialFilter: all
        - entity-content:kubernetes/kubernetes
        - entity-content:argocd/gitops # del module/argocd
        - entity-content:backstage-plugin-prometheus/metrics
        - entity-content:gitea/git-actions

    organization:
      name: Platform Engineering

    backend:
      baseUrl: ${BACKSTAGE_BASE_URL}
      listen:
        port: 7007
        host: 0.0.0.0
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          database: ${POSTGRES_DB}
      csp:
        connect-src: ["'self'", "http:", "https:"]
      cors:
        origin: ${BACKSTAGE_BASE_URL}
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      reading:
        allow:
          - host: ${GITEA_HOST}
      actions:
        pluginSources:
          - auth
          - catalog
          - scaffolder

    integrations:
      gitea:
        - host: ${GITEA_HOST}
          baseUrl: ${GITEA_BASE_URL}
          username: ${GITEA_USERNAME}
          password: ${GITEA_PASSWORD}

    proxy:
      endpoints:
        "/prometheus/api":
          target: ${PROMETHEUS_API_URL}
          changeOrigin: true
          secure: false
        "/docker":
          target: ${DOCKER_HUB_URL}
          changeOrigin: true

    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local

    auth:
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
          userEntityRef: user:default/guest
          ownershipEntityRefs:
            - user:default/guest
            - group:default/guests
      experimentalClientIdMetadataDocuments:
        enabled: false

    scaffolder: {}

    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      rules:
        - allow: [Component, System, API, Resource, Location, Group, User, Template]
      locations:
        - type: file
          target: ./examples/entities.yaml
        - type: file
          target: ./examples/template/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./examples/org.yaml
          rules:
            - allow: [User, Group]
        - type: file
          target: ../../software-template/java-service-golden-path/template.yaml
          rules:
            - allow: [Template]
        - type: url
          target: ${GITEA_CATALOG_INDEX_URL}
          rules:
            - allow: [Location]

    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: local
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              skipTLSVerify: true
              skipMetricsLookup: true

    permission:
      enabled: true

    mcpActions:
      name: Demo IDP Backstage
      description: Developer portal para catalogo, golden paths, Kubernetes, ArgoCD, Gitea, imagenes y metricas.

    argocd:
      username: ${ARGOCD_USERNAME}
      password: ${ARGOCD_PASSWORD}
      appLocatorMethods:
        - type: config
          instances:
            - name: local
              url: ${ARGOCD_URL}

    prometheus:
      proxyPath: /prometheus/api
      uiUrl: ${PROMETHEUS_UI_URL}

    platformGitea:
      mockMode: false
      actionsEnabled: true
      gitea:
        baseUrl: ${GITEA_BASE_URL}
        token: ${GITEA_TOKEN}
      gitops: # usado por scaffolder
        owner: root
        repo: repo-infra
        baseBranch: main
        catalogIndexPath: backstage/catalog/index.yaml

  extraEnvVars:
    - name: NODE_ENV
      value: production
  extraEnvVarsCM:
    - backstage-v3-runtime-config
  extraEnvVarsSecrets:
    - backstage-v3-secrets

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

service:
  type: ClusterIP
  ports:
    backend: 7007

serviceAccount:
  create: true
  name: backstage
  automountServiceAccountToken: true

postgresql:
  enabled: false

extraDeploy:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: backstage-kubernetes-readonly
    rules:
      - apiGroups: [""]
        resources: [pods, services, configmaps, endpoints, namespaces]
        verbs: [get, list, watch]
      - apiGroups: [apps]
        resources: [deployments, replicasets, statefulsets, daemonsets]
        verbs: [get, list, watch]
      - apiGroups: [batch]
        resources: [jobs, cronjobs]
        verbs: [get, list, watch]
      - apiGroups: [networking.k8s.io]
        resources: [ingresses]
        verbs: [get, list, watch]
      - apiGroups: [gateway.networking.k8s.io]
        resources: [gateways, httproutes, grpcroutes]
        verbs: [get, list, watch]
      - apiGroups: [argoproj.io]
        resources: [applications, rollouts]
        verbs: [get, list, watch]
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: backstage-kubernetes-readonly
    subjects:
      - kind: ServiceAccount
        name: backstage
        namespace: backstage
    roleRef:
      kind: ClusterRole
      name: backstage-kubernetes-readonly
      apiGroup: rbac.authorization.k8s.io
